<div class="h-screen w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm">
  <div class="p-6 border-b border-gray-100">
    <div class="flex items-center gap-3">
      <mat-icon color="primary" class="scale-150">bug_report</mat-icon>
      <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Scrapy<span class="text-blue-600">UI</span></h1>
    </div>
  </div>

  <div class="flex-grow overflow-y-auto py-4">
    <mat-nav-list class="px-2">
      @for (item of navItems; track item.name) {
        <a mat-list-item [routerLink]="item.route" routerLinkActive="bg-blue-50 text-blue-700 font-semibold rounded-lg" [routerLinkActiveOptions]="{exact: item.route === '/'}" #rla="routerLinkActive" class="mb-1 text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-lg transition-colors">
          <mat-icon matListItemIcon [ngClass]="{'text-blue-600': rla.isActive}">{{item.icon}}</mat-icon>
          <span matListItemTitle>{{item.name}}</span>
        </a>
      }
    </mat-nav-list>
  </div>

  <div class="p-4 border-t border-gray-100 text-xs text-center text-gray-400">
    Scrapy Web UI v0.1.0
  </div>
</div>
